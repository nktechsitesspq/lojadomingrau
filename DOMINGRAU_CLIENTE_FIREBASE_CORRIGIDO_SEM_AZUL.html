.badge{display:inline-block;background:#fff;color:#111;padding:8px 14px;border-radius:30px;font-weight:900;margin-bottom:18px}
h1{font-size:clamp(52px,13vw,110px);line-height:.86;text-transform:uppercase;text-shadow:0 0 25px #000;margin-bottom:25px}
section{padding:25px;max-width:1200px;margin:auto}
.panel{background:#15151d;border:1px solid #2b2b36;border-radius:22px;padding:20px;box-shadow:0 0 30px #0008;margin-top:-40px}
.hide{display:none!important}
.form{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
input,textarea,select{width:100%;padding:15px;border-radius:14px;border:1px solid #333;background:#0f0f15;color:#fff;outline:none;font-size:16px}
.passWrap{position:relative;margin:8px 0}.passWrap input{padding-right:52px;margin:0}.eyeBtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:0;color:#fff;font-size:22px;cursor:pointer;padding:6px;box-shadow:none}
textarea{min-height:90px;grid-column:1/-1}
.topbar{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:25px}
.topbar h2{font-size:36px}
.search{max-width:360px}
.filtroSelect{margin-top:10px;max-width:360px;margin-bottom:2px}
.filtroSelect select{appearance:auto;background:#15151d;border:1px solid #333;color:#fff;font-weight:900;padding-right:40px}
.fotoPreview{grid-column:1/-1;color:#aaa;font-size:14px;margin-top:-4px}.fotoPreview b{color:#ffcc00}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin-top:25px}
.card{background:#15151d;border:1px solid #292933;border-radius:18px;overflow:hidden}
.card img{width:100%;height:190px;object-fit:cover;background:#222}
.info{padding:15px}
.price{font-size:25px;font-weight:900;color:#ffcc00;margin:8px 0}
.small{color:#aaa;font-size:14px;margin-top:5px;line-height:1.35}
.error{color:#ff7070;font-weight:800;margin:8px 0}
.ok{color:#55ff99;font-weight:800;margin:8px 0}
.actions{display:flex;gap:8px;margin-top:12px}
.whats{flex:1;text-align:center;text-decoration:none;background:#25d366;color:#071b0f;padding:12px;border-radius:12px;font-weight:900}
.del{background:#e53935;color:white;border:0;border-radius:12px;padding:0 13px;cursor:pointer}
.empty{padding:28px;text-align:center;color:#aaa;border:1px dashed #444;border-radius:18px;margin-top:20px}

  -webkit-tap-highlight-color: transparent !important;

a:focus, a:active,

<body>

<button class="menuBtn" onclick="toggleMenu()">☰</button>
<div class="userbar" id="userbar" onclick="abrirLogin()">Entrar</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="drawer" id="drawer">
  <h2>DOMINGRAU</h2>
  <button class="btn btn2" onclick="mostrarTodos()">🏠 Início</button>
  <button class="btn btn2" onclick="meusProdutos()">📦 Meus produtos</button>
  <button class="btn" onclick="abrirAdicionar()">➕ Adicionar produto</button>
  <button class="btn btn2" onclick="abrirLogin()">👤 Criar conta / Entrar</button>
  <button class="btn btn2" onclick="sair()">🚪 Sair</button>
</div>

<header class="hero">
  <div>
    <span class="badge">LOJINHA DOMINGRAU</span>
    <h1>Vendas<br>e compras</h1>
    <button class="btn" onclick="abrirAdicionar()">+ Anunciar produto</button>
  </div>
</header>

<section>
  <div class="panel hide" id="form">
    <h2>Adicionar anúncio</h2><br>
    <div class="form">
      <input id="nome" placeholder="Nome do produto">
      <input id="valor" inputmode="numeric" placeholder="Valor Ex: 1.000,00" oninput="mascaraValor(this)">
      <input id="vendedor" placeholder="Nome do vendedor">
      <input id="cidade" placeholder="Cidade">
      <input id="bairro" placeholder="Bairro">
      <input id="whatsapp" inputmode="numeric" placeholder="(15) 99177-6231" oninput="mascaraTelefone(this)">
      <select id="categoria" required>
        <option value="">Escolher categoria</option>
        <option>Carros</option><option>Motos</option><option>Celulares</option><option>Videogames</option>
        <option>Notebooks</option><option>Peças de moto</option><option>Peças de carro</option>
        <option>Roupas</option><option>Acessórios</option><option>Serviços</option><option>Outros</option>
      </select>
      <input id="foto" type="file" accept="image/*" multiple onchange="validarFotos()">
      <div class="fotoPreview" id="fotoInfo">Escolha de <b>1 até 5 fotos</b> • grátis, sem Storage</div>
      <textarea id="desc" placeholder="Descrição do produto"></textarea>
    </div><br>
    <button class="btn" onclick="addProduto()">Publicar na lojinha</button>

  <div class="topbar">
    <h2 id="tituloLista">Produtos anunciados</h2>

  <div class="filtroSelect">
    <select id="filtroCategoria" onchange="render()">
      <option value="Todos">Nenhum</option>
      <option value="Todos">Todos</option><option value="Carros">Carros</option><option value="Motos">Motos</option>
      <option value="Celulares">Celulares</option><option value="Videogames">Videogames</option><option value="Notebooks">Notebooks</option>
      <option value="Peças de moto">Peças de moto</option><option value="Peças de carro">Peças de carro</option>
      <option value="Roupas">Roupas</option><option value="Acessórios">Acessórios</option><option value="Serviços">Serviços</option><option value="Outros">Outros</option>
    </select>
  </div>
  <div class="grid" id="lista"></div>
</section>

<div class="modal" id="loginModal">
  <div class="box">
    <h2 id="loginTitulo">Entrar</h2>
    <div class="choice">
      <p>Deseja criar conta ou entrar?</p>
      <button class="btn btn2" id="btnEntrar" onclick="modoLogin()">Entrar</button>
      <button class="btn btn2" id="btnCriar" onclick="modoCriar()">Criar conta</button>
    </div>
    <div id="loginCampos" class="hide">
      <input id="loginTel" inputmode="numeric" placeholder="(15) 99177-6231" oninput="mascaraTelefone(this)">
      <div class="passWrap"><input id="loginSenha" type="password" placeholder="Senha"><button class="eyeBtn" type="button" onclick="toggleSenha('loginSenha', this)">👁️</button></div>
      <div id="codigoCriarArea" class="hide">
        <div id="recaptcha-container"></div>
        <button class="btn btn2" onclick="enviarCodigoCriar()">Enviar código SMS</button>
        <input id="codigoCriar" inputmode="numeric" maxlength="6" placeholder="Código SMS">
      </div>
      <div id="loginMsg"></div>
      <button class="btn" id="acaoLogin" onclick="entrarConta()">Entrar</button>
      <button class="linkBtn hide" id="recBtn" onclick="abrirRecuperar()">🔑 Recuperar senha</button><br><br>
    </div>

  </div>
</div>

<div class="modal" id="recoverModal">
  <div class="box">
    <h2>Recuperar senha</h2>
    <input id="recTel" inputmode="numeric" placeholder="(15) 99177-6231" oninput="mascaraTelefone(this)">
    <div id="recaptcha-recover"></div>
    <button class="btn" onclick="enviarCodigoRecuperar()">Enviar código SMS</button>
    <div id="codigoArea" class="hide">
      <input id="recCodigo" inputmode="numeric" maxlength="6" placeholder="Código de 6 dígitos">
      <div class="passWrap"><input id="novaSenha" type="password" placeholder="Nova senha"><button class="eyeBtn" type="button" onclick="toggleSenha('novaSenha', this)">👁️</button></div>
      <button class="btn" onclick="confirmarCodigoRecuperar()">Confirmar e trocar senha</button>
    </div>
    <div id="recMsg"></div>
    <button class="btn btn2" onclick="fecharRecuperar()">Fechar</button>

<footer>Domingrau</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* COLE A CONFIGURAÇÃO DO SEU FIREBASE AQUI */
const firebaseConfig = {
  apiKey: "AIzaSyA-25AP97-IqaxAG9coYuOY_s8-ItEwrWo",
  authDomain: "lojinha-domingrau.firebaseapp.com",
  projectId: "lojinha-domingrau",
  storageBucket: "lojinha-domingrau.firebasestorage.app",
  messagingSenderId: "669115228198",
  appId: "1:669115228198:web:b365e3bad336a4a16786e7",
  measurementId: "G-X4LH1WGFB2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let produtos = [];
window.toggleSenha = function(id, btn){ const campo=document.getElementById(id); if(!campo) return; campo.type = campo.type === 'password' ? 'text' : 'password'; btn.textContent = campo.type === 'password' ? '👁️' : '🙈'; };
let usuarioAtual = JSON.parse(localStorage.getItem('domingrauUsuarioFirebase') || 'null');
let filtroMeus = false;
let abrirFormDepoisLogin = false;
let confirmCriar = null;
let confirmRecover = null;

window.limparTel = v => String(v).replace(/\D/g,'');
window.formatTel = t => {
  t = limparTel(t);
  return t.length === 11 ? `(${t.slice(0,2)}) ${t.slice(2,7)}-${t.slice(7)}` : t;
};
window.mascaraTelefone = input => {
  let v = limparTel(input.value).slice(0,11);
  if(v.length>10) input.value=`(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7,11)}`;
  else if(v.length>6) input.value=`(${v.slice(0,2)}) ${v.slice(2,6)}-${v.slice(6,10)}`;
  else if(v.length>2) input.value=`(${v.slice(0,2)}) ${v.slice(2)}`;
  else if(v.length>0) input.value=`(${v}`;
};
function senhaOk(s){return s.length>=5}
function telFirebase(t){ t = limparTel(t); return t.startsWith('55') ? '+'+t : '+55'+t; }
function atualizarUserbar(){ userbar.innerText = usuarioAtual ? formatTel(usuarioAtual.telefone) : 'Entrar'; }
function moeda(v){ let n=Number(String(v).replace(/[^0-9,\.]/g,'').replace(',','.')||0); return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }

window.toggleMenu=()=>{drawer.classList.toggle('open');overlay.classList.toggle('show')}
window.abrirLogin=()=>{
  if(usuarioAtual){ alert('Você já está logado com ' + formatTel(usuarioAtual.telefone)); return; }
  loginModal.classList.add('show'); loginTitulo.innerText='Entrar'; loginCampos.classList.add('hide');
  btnEntrar.classList.remove('active'); btnCriar.classList.remove('active'); loginMsg.innerHTML=''; recBtn.classList.add('hide');
};
window.fecharLogin=()=>loginModal.classList.remove('show');
window.modoLogin=()=>{
  loginTitulo.innerText='Entrar'; loginCampos.classList.remove('hide'); codigoCriarArea.classList.add('hide');
  btnEntrar.classList.add('active'); btnCriar.classList.remove('active'); acaoLogin.innerText='Entrar';
  acaoLogin.onclick=entrarConta; loginMsg.innerHTML=''; recBtn.classList.add('hide');
};
window.modoCriar=()=>{
  loginTitulo.innerText='Criar conta'; loginCampos.classList.remove('hide'); codigoCriarArea.classList.remove('hide');
  btnCriar.classList.add('active'); btnEntrar.classList.remove('active'); acaoLogin.innerText='Criar conta';
  acaoLogin.onclick=criarConta; loginMsg.innerHTML=''; recBtn.classList.add('hide');
};

async function getUser(tel){ return await getDoc(doc(db,'usuarios',tel)); }

window.enviarCodigoCriar = async () => {
  const tel = limparTel(loginTel.value);
  if(tel.length < 10) return loginMsg.innerHTML='<div class="error">Digite um telefone válido.</div>';
  const userDoc = await getUser(tel);
  if(userDoc.exists()) return loginMsg.innerHTML='<div class="error">Esse número já tem conta. Aperte em Entrar.</div>';
  if(!window.recaptchaCriar) window.recaptchaCriar = new RecaptchaVerifier(auth, 'recaptcha-container', {size:'normal'});
  try{
    confirmCriar = await signInWithPhoneNumber(auth, telFirebase(tel), window.recaptchaCriar);
    loginMsg.innerHTML='<div class="ok">Código SMS enviado.</div>';
  }catch(e){
    loginMsg.innerHTML='<div class="error">SMS não enviado. Confira se o domínio do site está autorizado no Firebase Authentication e tente novamente.</div>';
  }
};

window.criarConta = async () => {
  const tel = limparTel(loginTel.value), senha = loginSenha.value.trim(), codigo = codigoCriar.value.trim();
  loginMsg.innerHTML=''; recBtn.classList.add('hide');
  if(tel.length<10) return loginMsg.innerHTML='<div class="error">Digite um telefone válido.</div>';
  if(!senhaOk(senha)) return loginMsg.innerHTML='<div class="error">A senha precisa ter no mínimo 5 caracteres.</div>';
  const userDoc = await getUser(tel);
  if(userDoc.exists()) return loginMsg.innerHTML='<div class="error">Esse número já tem conta. Aperte em Entrar.</div>';
  if(!confirmCriar) return loginMsg.innerHTML='<div class="error">Primeiro envie o código SMS.</div>';
  if(codigo.length<6) return loginMsg.innerHTML='<div class="error">Digite o código SMS.</div>';
  await confirmCriar.confirm(codigo);
  await setDoc(doc(db,'usuarios',tel), {telefone:tel, senha, criadoEm:serverTimestamp()});
  usuarioAtual={telefone:tel}; localStorage.setItem('domingrauUsuarioFirebase',JSON.stringify(usuarioAtual));
  fecharLogin(); if(document.getElementById('filtroCategoria')) filtroCategoria.value = 'Todos';
atualizarUserbar(); if(abrirFormDepoisLogin){abrirFormDepoisLogin=false; abrirAdicionar();}
};

window.entrarConta = async () => {
  const tel = limparTel(loginTel.value), senha = loginSenha.value.trim();
  loginMsg.innerHTML=''; recBtn.classList.add('hide');
  if(tel.length<10) return loginMsg.innerHTML='<div class="error">Digite um telefone válido.</div>';
  if(!senhaOk(senha)) return loginMsg.innerHTML='<div class="error">Digite sua senha.</div>';
  const snap = await getUser(tel);
  if(!snap.exists()) return loginMsg.innerHTML='<div class="error">Esse número ainda não tem conta. Aperte em Criar conta para cadastrar.</div>';
  if(snap.data().senha !== senha){ loginMsg.innerHTML='<div class="error">Senha incorreta.</div>'; recBtn.classList.remove('hide'); return; }
  usuarioAtual={telefone:tel}; localStorage.setItem('domingrauUsuarioFirebase',JSON.stringify(usuarioAtual));
  fecharLogin(); atualizarUserbar(); if(abrirFormDepoisLogin){abrirFormDepoisLogin=false; abrirAdicionar();}
};

window.abrirRecuperar=()=>{ fecharLogin(); recoverModal.classList.add('show'); recMsg.innerHTML=''; codigoArea.classList.add('hide'); recTel.value=loginTel.value; };
window.fecharRecuperar=()=>recoverModal.classList.remove('show');

window.enviarCodigoRecuperar = async () => {
  const tel = limparTel(recTel.value); recMsg.innerHTML='';
  if(tel.length<10) return recMsg.innerHTML='<div class="error">Digite um telefone válido.</div>';
  const snap = await getUser(tel);
  if(!snap.exists()) return recMsg.innerHTML='<div class="error">Esse telefone não tem conta cadastrada.</div>';
  if(!window.recaptchaRecover) window.recaptchaRecover = new RecaptchaVerifier(auth, 'recaptcha-recover', {size:'normal'});
  try{
    confirmRecover = await signInWithPhoneNumber(auth, telFirebase(tel), window.recaptchaRecover);
    codigoArea.classList.remove('hide');
    recMsg.innerHTML='<div class="ok">Código SMS enviado.</div>';
  }catch(e){
    recMsg.innerHTML='<div class="error">SMS não enviado. Confira se o domínio do site está autorizado no Firebase Authentication e tente novamente.</div>';
  }
};

window.confirmarCodigoRecuperar = async () => {
  const tel=limparTel(recTel.value), codigo=recCodigo.value.trim(), nova=novaSenha.value.trim();
  if(!confirmRecover) return recMsg.innerHTML='<div class="error">Envie o código primeiro.</div>';
  if(codigo.length<6) return recMsg.innerHTML='<div class="error">Digite o código SMS.</div>';
  if(!senhaOk(nova)) return recMsg.innerHTML='<div class="error">Nova senha precisa ter no mínimo 5 caracteres.</div>';
  await confirmRecover.confirm(codigo);
  await updateDoc(doc(db,'usuarios',tel), {senha:nova});
  recMsg.innerHTML='<div class="ok">Senha alterada com sucesso.</div>';
  setTimeout(()=>{fecharRecuperar(); abrirLogin(); modoLogin();},900);
};

window.sair=()=>{usuarioAtual=null;localStorage.removeItem('domingrauUsuarioFirebase');filtroMeus=false;form.classList.add('hide');atualizarUserbar();render();}
function abrirLoginObrigatorio(){ loginModal.classList.add('show'); loginTitulo.innerText='Entrar'; loginCampos.classList.add('hide'); btnEntrar.classList.remove('active'); btnCriar.classList.remove('active'); loginMsg.innerHTML='<div class="error">Para anunciar, entre ou crie uma conta.</div>'; recBtn.classList.add('hide'); }
function precisaLogin(){ if(!usuarioAtual){ abrirLoginObrigatorio(); return true; } return false; }
window.abrirAdicionar=()=>{ abrirFormDepoisLogin=true; if(precisaLogin())return; if(drawer.classList.contains('open'))toggleMenu(); form.classList.remove('hide'); whatsapp.value=formatTel(usuarioAtual.telefone); form.scrollIntoView({behavior:'smooth'}); }
window.meusProdutos=()=>{ if(precisaLogin())return; filtroMeus=true; tituloLista.innerText='Meus produtos'; if(drawer.classList.contains('open'))toggleMenu(); render(); }
window.mostrarTodos=()=>{ filtroMeus=false; tituloLista.innerText='Produtos anunciados'; if(drawer.classList.contains('open'))toggleMenu(); render(); }


function comprimirImagem(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 650;
        let w = img.width;
        let h = img.height;

        if(w > h && w > max){
          h = Math.round(h * max / w);
          w = max;
        }else if(h >= w && h > max){
          w = Math.round(w * max / h);
          h = max;
        }

        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        const base64 = canvas.toDataURL('image/jpeg', 0.55);
        resolve(base64);
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

window.addProduto = async () => {
  if(precisaLogin()) return;

  const usuarioSnap = await getDoc(doc(db,'usuarios',usuarioAtual.telefone));
  if(usuarioSnap.exists() && usuarioSnap.data().bloqueado === true){
    alert('Seu número foi bloqueado pelo administrador e não pode anunciar.');
    return;
  }

  const inicioHoje = new Date();
  inicioHoje.setHours(0,0,0,0);
  const postsHoje = produtos.filter(p => p.dono === usuarioAtual.telefone && p.criadoMs && p.criadoMs >= inicioHoje.getTime()).length;
  if(postsHoje >= 5){
    alert('Limite atingido: você só pode publicar no máximo 5 anúncios por dia.');
    return;
  }

  const n=nome.value.trim(), val=valor.value.trim(), vend=vendedor.value.trim(), cid=cidade.value.trim(), bai=bairro.value.trim(), whats=limparTel(whatsapp.value), cat=categoria.value, d=desc.value.trim();
  const files = Array.from(foto.files || []);

  if(!n||!val||!vend||!cid||!bai||!cat||whats.length<10){
    alert('Preencha tudo: nome, valor, categoria, cidade, bairro, vendedor e WhatsApp.');
    return;
  }
  if(files.length < 1){
    alert('Adicione pelo menos 1 foto do produto.');
    return;
  }
  if(files.length > 5){
    alert('Pode adicionar no máximo 5 fotos.');
    return;
  }

  let fotos = [];
  for(const file of files){
    fotos.push(await comprimirImagem(file));
  }

  await addDoc(collection(db,'produtos'), {
    dono:usuarioAtual.telefone,
    nome:n,
    valor:val,
    vendedor:vend,
    cidade:cid,
    bairro:bai,
    whatsapp:whats,
    categoria:cat,
    desc:d,
    foto:fotos[0],
    fotos:fotos,
    criadoMs:Date.now(),
    criadoEm:serverTimestamp(),
    expiraEm:Date.now() + (3 * 24 * 60 * 60 * 1000)
  });

  document.querySelectorAll('#form input,#form textarea').forEach(i=>i.value='');
  categoria.value = '';
  whatsapp.value=formatTel(usuarioAtual.telefone);
  foto.value='';
  fotoInfo.innerHTML = 'Escolha de <b>1 até 5 fotos</b> • grátis, sem Storage';
};

window.apagar = async (id,dono) => {
  if(!usuarioAtual || dono !== usuarioAtual.telefone) return alert('Você só pode apagar seus próprios produtos.');
  if(confirm('Remover esse anúncio?')) await deleteDoc(doc(db,'produtos',id));
};

window.render = () => {
  const termo=busca.value.toLowerCase();
  const catFiltro=filtroCategoria.value;
  let filtrados=produtos.filter(p => (!p.expiraEm || p.expiraEm > Date.now()) && (p.nome+p.categoria+p.vendedor+(p.cidade||'')+(p.bairro||'')+(p.desc||'')).toLowerCase().includes(termo));
  if(catFiltro && catFiltro!=='Todos' && catFiltro!=='Nenhum') filtrados=filtrados.filter(p=>p.categoria===catFiltro);
  if(filtroMeus && usuarioAtual) filtrados=filtrados.filter(p=>p.dono===usuarioAtual.telefone);
  lista.innerHTML='';
  if(!filtrados.length){lista.innerHTML='<div class="empty">Nenhum produto encontrado.</div>';return}
  filtrados.forEach(p=>{
    const msg=encodeURIComponent(`Olá, vi seu anúncio na lojinha Domingrau!\n\nProduto: ${p.nome}\nValor: ${moeda(p.valor)}\nCategoria: ${p.categoria}\n\nAinda está disponível?`);
    const tel=p.whatsapp.startsWith('55')?p.whatsapp:'55'+p.whatsapp;
